<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lijstje</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 min-h-screen">
    <div class="max-w-lg mx-auto px-4 pt-16">
      <h1 class="text-3xl font-bold text-gray-900 mb-2">Lijstje</h1>
      <p class="text-gray-400 mb-10">Create a shopping list and share it with anyone.</p>

      <form id="create-form" class="flex flex-col gap-3">
        <input
          id="list-name"
          type="text"
          placeholder="List name…"
          class="rounded-lg border border-gray-200 px-4 py-3 text-base outline-none focus:border-emerald-400 bg-white shadow-sm"
          autocomplete="off"
          required
        />
        <div class="flex gap-2">
          <input
            id="create-secret"
            type="password"
            placeholder="Secret…"
            class="flex-1 rounded-lg border border-gray-200 px-4 py-3 text-base outline-none focus:border-emerald-400 bg-white shadow-sm"
            autocomplete="current-password"
          />
          <button
            type="submit"
            class="bg-emerald-500 hover:bg-emerald-600 text-white font-medium px-5 py-3 rounded-lg shadow-sm transition-colors disabled:opacity-50"
          >
            Create
          </button>
        </div>
      </form>

      <p id="error" class="mt-3 text-sm text-red-500"></p>
    </div>

    <script type="module" src="/js/home.js"></script>
  </body>
</html>
